name: ModelBound Skill Check
description: Lint, trust-score, and optimize-dry-run agent skills on changed files in CI
branding:
  icon: shield
  color: blue
inputs:
  mode:
    description: "Check mode: lint (local only), trust, optimize, or full (trust + optimize dry-run + badge report)"
    required: false
    default: full
  skills-glob:
    description: "Newline- or comma-separated globs for skill files (relative to repo root)"
    required: false
    default: |
      .modelbound/**/*.md
      .cursor/rules/**/*.mdc
      .cursor/rules/**/*.md
      .claude/skills/**/SKILL.md
      .kiro/skills/**/*.md
      .github/skills/**/SKILL.md
  publish-report:
    description: "Publish a public CI report for README badges"
    required: false
    default: "true"
  api-url:
    description: "ModelBound API base URL"
    required: false
    default: https://modelbound.co
  min-trust:
    description: "Fail the job if average trust score is below this (0–100). 0 disables."
    required: false
    default: "0"
  comment:
    description: "Post or update a PR comment with results"
    required: false
    default: "true"
  mcp-version:
    description: "modelbound-mcp version for local lint"
    required: false
    default: "0.4.6"
outputs:
  skills-scanned:
    description: Number of skill files scanned
  avg-trust:
    description: Average trust score (cloud modes only)
  lint-status:
    description: "pass, warn, or fail"
  badge-url:
    description: Public badge URL for this repo
runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Run ModelBound skill check
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_SKILLS_GLOB: ${{ inputs.skills-glob }}
        INPUT_PUBLISH_REPORT: ${{ inputs.publish-report }}
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_MIN_TRUST: ${{ inputs.min-trust }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_MCP_VERSION: ${{ inputs.mcp-version }}
        MODELBOUND_API_KEY: ${{ env.MODELBOUND_API_KEY }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: node "${{ github.action_path }}/run.mjs"
