name: ModelBound Skill Check (self-test)
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  skill-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
        with:
          mode: lint
        env:
          MODELBOUND_API_KEY: ${{ secrets.MODELBOUND_API_KEY }}
